<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta description="Moon Invasion">
    <link rel="icon" type="image/x-icon" href="./assets/moon/1.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/game.css">
    <title>Moon Invasion</title>
</head>

<body>
    <div id="background"></div>
    <div id="veil"></div>
    
    <!-- Menu -->
    <div id="menu">
        <h1 id="moonTitle">
            <span id="moonTextLeft" class="titleText">Moon</span>
            <span id="moonWrap"><canvas id="moonCanvas"></canvas><svg id="moonPlay" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#e3e3e3" role="img" aria-label="Play"><path d="M320-203v-560l440 280-440 280Zm60-280Zm0 171 269-171-269-171v342Z" /></svg></span>
            <span id="moonTextRight" class="titleText">Invasion</span>
        </h1>

        <div id="settingsBtn">
            <img src="./assets/Icons/Circle01.png" alt="" id="setBg">
            <img src="./assets/Icons/Icon18.png" alt="Settings" id="setIcon">
        </div>
    </div>

    <!-- Settings -->
    <div id="settings">
        <div id="settingsWindow">
            <div id="settingsInner">
                <div id="setTopBar">
                    <div id="setBarAudio">Audio</div>
                    <div id="setBarCredits">Credits</div>
                </div>
                <div id="setContent">
                    <div id="setAudio" class="active">
                        <h2>Music:</h2>
                        <div class="setContainer">
                            <img src="./assets/Icons/ArrowsLeft.png" alt="+" id="setMusicAdjL" class="leftArrow">
                            <h2 id="setMusicValue">50%</h2>
                            <img src="./assets/Icons/ArrowsRight.png" alt="-" id="setMusicAdjR" class="rightArrow">
                        </div>
                        
                        <h2>SFX:</h2>
                        <div class="setContainer">
                            <img src="./assets/Icons/ArrowsLeft.png" alt="+" id="setSFXAdjL" class="leftArrow">
                            <h2 id="setSFXValue">50%</h2>
                            <img src="./assets/Icons/ArrowsRight.png" alt="-" id="setSFXAdjR" class="rightArrow">
                        </div>
                    </div>
                    <div id="setCredits">
                        <h2>Author:</h2>
                        <h3><a href="https://github.com/DaOnlyDelta/moonEscape" target="_blank">Enej Leskovar</a></h3>
                    </div>
                    <div id="setReturnBtn"></div>
                </div>
                <div id="setBottomBar">
                    <div id="setBarCancel">Cancel</div>
                    <div id="setBarSave">Save</div>
                </div>
            </div>
        </div>
        <svg id="settingsBorder" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true" focusable="false">
            <polygon id="settingsBorderPoly" points="0,0 80,0 100,100 20,100" />
        </svg>
    </div>

    <!-- Game -->
    <div id="game">
        <canvas id="player"></canvas>
        <canvas id="moon2"></canvas>
    </div>
</body>
<!-- jQuery -->
<script src="js/jquery.js"></script>

<script src="js/sound.js"></script>
<script src="js/player.js"></script>
<script src="js/game.js"></script>
<script src="js/menu.js"></script>
<script src="js/settings.js"></script>
</html>
